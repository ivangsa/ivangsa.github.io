<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">AsyncAPI references resolved through Git, Apicurio, and Artifactory</title>
  <desc id="desc">An AsyncAPI client specification uses a $ref URL in the center of the image. The reference can resolve through Git, Apicurio Registry, or Artifactory, each shown as a logo-style canonical reference store, before reaching the provider AsyncAPI contract.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-18%" width="124%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M2 2 L10 6 L2 10" fill="none" stroke="#1f2937" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <style>
      .sans { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .mono { font-family: Consolas, Menlo, monospace; }
      .card { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .ink { fill: #111827; }
      .muted { fill: #475569; }
      .caption { font-size: 15px; fill: #475569; }
      .label { font-size: 20px; font-weight: 900; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.42"/>

  <g class="sans">
    <text x="600" y="56" text-anchor="middle" font-size="34" font-weight="850" class="ink">AsyncAPI $ref Resolution</text>
    <text x="600" y="90" text-anchor="middle" font-size="18" class="muted">Git, Apicurio Registry, and Artifactory as canonical reference stores</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="225" width="252" height="166" rx="18" class="card"/>
    <rect x="60" y="225" width="252" height="50" rx="18" fill="#eef2ff"/>
    <path d="M60 275H312" stroke="#1f2937" stroke-width="2"/>
  </g>
  <g class="sans">
    <text x="186" y="258" text-anchor="middle" font-size="19" font-weight="900" fill="#1d4ed8">client AsyncAPI</text>
    <text x="88" y="307" font-size="15" class="mono ink">channels:</text>
    <text x="110" y="334" font-size="15" class="mono ink">orderCreated:</text>
    <text x="132" y="361" font-size="15" fill="#2563eb" class="mono">$ref: &lt;url&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="424" y="205" width="352" height="206" rx="22" class="card"/>
    <rect x="424" y="205" width="352" height="56" rx="22" fill="#f1f5f9"/>
    <path d="M424 261H776" stroke="#1f2937" stroke-width="2"/>
  </g>
  <g class="sans">
    <text x="600" y="241" text-anchor="middle" font-size="21" font-weight="900" fill="#334155">AsyncAPI refs</text>
    <circle cx="514" cy="322" r="42" fill="#0b7285"/>
    <circle cx="514" cy="322" r="25" fill="#ffffff"/>
    <circle cx="514" cy="322" r="10" fill="#0b7285"/>
    <path d="M514 280 C561 286 579 316 584 356 M514 364 C467 358 449 328 444 288" fill="none" stroke="#0b7285" stroke-width="9" stroke-linecap="round"/>
    <text x="610" y="311" font-size="16" class="mono ink">$ref:</text>
    <text x="610" y="340" font-size="16" class="mono" fill="#2563eb">https://store/.../asyncapi.yml</text>
    <text x="600" y="383" text-anchor="middle" class="caption">plain HTTP GET, no custom resolver</text>
  </g>

  <path d="M312 308 H424" fill="none" stroke="#1f2937" stroke-width="3.2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="858" y="118" width="270" height="124" rx="18" class="card"/>
  </g>
  <g class="sans">
    <g transform="translate(895 148) rotate(45 32 32)">
      <rect x="3" y="3" width="58" height="58" rx="8" fill="#f05033"/>
      <path d="M21 18 L45 42" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="21" cy="18" r="6" fill="#ffffff"/>
      <circle cx="45" cy="42" r="6" fill="#ffffff"/>
      <path d="M32 29 L45 16" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <circle cx="45" cy="16" r="6" fill="#ffffff"/>
    </g>
    <text x="997" y="175" class="label" fill="#f05033">Git</text>
    <text x="997" y="202" class="caption">branches, tags, commit log</text>
    <text x="997" y="226" class="caption">raw URL as the store</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="253" width="270" height="124" rx="18" class="card"/>
  </g>
  <g class="sans">
    <circle cx="931" cy="315" r="34" fill="#1d4ed8"/>
    <path d="M912 333 L929 285 L950 333" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M920 320 H942" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <circle cx="961" cy="291" r="7" fill="#60a5fa"/>
    <circle cx="973" cy="315" r="7" fill="#60a5fa"/>
    <circle cx="960" cy="339" r="7" fill="#60a5fa"/>
    <path d="M952 296 L966 311 M966 320 L952 335" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round"/>
    <text x="997" y="303" class="label" fill="#1d4ed8">Apicurio</text>
    <text x="997" y="330" class="caption">Registry branches + versions</text>
    <text x="997" y="354" class="caption">validation and graph</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="858" y="388" width="270" height="124" rx="18" class="card"/>
  </g>
  <g class="sans">
    <path d="M900 423 L931 407 L962 423 L962 457 L931 474 L900 457 Z" fill="#e8f8ef" stroke="#43a047" stroke-width="3"/>
    <path d="M900 423 L931 440 L962 423 M931 440 V474" fill="none" stroke="#43a047" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="909" cy="416" r="8" fill="#43a047"/>
    <path d="M917 413 C930 401 951 404 965 421" fill="none" stroke="#43a047" stroke-width="4" stroke-linecap="round"/>
    <text x="997" y="436" class="label" fill="#2e7d32">Artifactory</text>
    <text x="997" y="463" class="caption">generic artifact URLs</text>
    <text x="997" y="487" class="caption">CI-managed aliases</text>
  </g>

  <path d="M776 271 C817 250 820 185 858 180" fill="none" stroke="#1f2937" stroke-width="3.2" marker-end="url(#arrow)"/>
  <path d="M776 308 H858" fill="none" stroke="#1f2937" stroke-width="3.2" marker-end="url(#arrow)"/>
  <path d="M776 346 C817 368 820 445 858 450" fill="none" stroke="#1f2937" stroke-width="3.2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="424" y="478" width="352" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  </g>
  <g class="sans">
    <text x="600" y="515" text-anchor="middle" font-size="18" font-weight="900" fill="#334155">canonical store contract</text>
    <text x="600" y="545" text-anchor="middle" font-size="16" class="muted">stable URL, moving alias, audit trail, readable by tooling</text>
  </g>
</svg>
